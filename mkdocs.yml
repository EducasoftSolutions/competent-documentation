site_name: "Competent – Uživatelská příručka"
site_description: Oficiální dokumentace LMS Competent od Educasoftu
site_author: Educasoft
site_url: https://educasoftsolutions.github.io/competent-documentation/

repo_name: EducasoftSolutions/competent-documentation
repo_url: https://github.com/EducasoftSolutions/competent-documentation
edit_uri: edit/main/docs/

theme:
  name: material
  language: cs
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
    - toc.follow
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Přepnout na tmavý režim
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Přepnout na světlý režim
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    logo: material/school

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

plugins:
  - search
  - glightbox
  - llmstxt:
      full_output: llms-full.txt
      markdown_description: |
        Tato dokumentace popisuje administrátorský portál LMS Competent.
        Zahrnuje návody pro administrátory, referenci nastavení a konceptuální přehled.
