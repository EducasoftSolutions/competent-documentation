site_name: "Competent — Uživatelská příručka"
site_description: Oficiální dokumentace LMS Competent od Educasoftu
site_author: Educasoft
site_url: https://docs.competent.cz/

repo_name: competent-docs
repo_url: https://docs.competent.cz/

theme:
  name: material
  language: cs
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
    - toc.follow
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Přepnout na tmavý režim
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Přepnout na světlý režim
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    logo: material/school

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

plugins:
  - search
  - glightbox
  - llmstxt:
      full_output: llms-full.txt
      markdown_description: |
        Tato dokumentace popisuje administrátorský portál LMS Competent.
        Zahrnuje návody pro administrátory, referenci nastavení a konceptuální přehled.
      sections:
        Úvod:
          - index.md
        Pro administrátory:
          - pro-administratory/index.md
          - pro-administratory/how-to/index.md
          - pro-administratory/how-to/aktivity/vytvoreni-noveho-objektu.md
          - pro-administratory/how-to/aktivity/presun-objektu.md
          - pro-administratory/how-to/aktivity/vytvoreni-scorm-aktivity.md
          - pro-administratory/how-to/aktivity/vyhledavani-v-aktivitach.md
          - pro-administratory/how-to/aktivity/filtry-a-vyhledavani.md
          - pro-administratory/how-to/aktivity/prirazovani-stitku.md
          - pro-administratory/reference/index.md
          - pro-administratory/reference/chybove-zpravy.md
          - pro-administratory/reference/obrazovka-aktivity.md
          - pro-administratory/reference/detail-aktivity.md
          - pro-administratory/concepts/index.md
          - pro-administratory/concepts/aktivita.md
          - pro-administratory/concepts/role.md
        Pro studenty:
          - pro-studenty/index.md
        Slovník:
          - slovnik/index.md

hooks:
  - hooks/copy_source.py

nav:
  - Úvod: index.md
  - Pro administrátory:
      - pro-administratory/index.md
      - Návody:
          - pro-administratory/how-to/index.md
          - Aktivity:
              - Vytvoření nového objektu: pro-administratory/how-to/aktivity/vytvoreni-noveho-objektu.md
              - Přesun objektu: pro-administratory/how-to/aktivity/presun-objektu.md
              - Vytvoření SCORM aktivity: pro-administratory/how-to/aktivity/vytvoreni-scorm-aktivity.md
              - Vyhledávání v aktivitách: pro-administratory/how-to/aktivity/vyhledavani-v-aktivitach.md
              - Filtry a vyhledávání: pro-administratory/how-to/aktivity/filtry-a-vyhledavani.md
              - Přiřazování štítků: pro-administratory/how-to/aktivity/prirazovani-stitku.md
      - Reference:
          - pro-administratory/reference/index.md
          - Obrazovka Aktivity: pro-administratory/reference/obrazovka-aktivity.md
          - Detail aktivity: pro-administratory/reference/detail-aktivity.md
          - Chybové zprávy: pro-administratory/reference/chybove-zpravy.md
      - Koncepty:
          - pro-administratory/concepts/index.md
          - Aktivita: pro-administratory/concepts/aktivita.md
          - Role a oprávnění: pro-administratory/concepts/role.md
  - Pro studenty: pro-studenty/index.md
  - Slovník: slovnik/index.md

extra:
  generator: false
